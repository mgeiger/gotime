services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: gotime
      POSTGRES_PASSWORD: gotime
      POSTGRES_DB: gotime_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotime"]
      interval: 2s
      timeout: 5s
      retries: 15

  tests:
    build:
      context: .
    environment:
      GOTIME_DATABASE_URL: postgresql+psycopg2://gotime:gotime@postgres:5432/gotime_test
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - pytest
      - -ra
      - --cov=gotime
      - --cov-fail-under=90
